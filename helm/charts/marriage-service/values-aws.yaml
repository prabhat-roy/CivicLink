# AWS overlay for marriage-service.
cloud:
  provider: aws
  storageClass: gp3
  ingressClass: alb

serviceAccount:
  annotations:
    eks.amazonaws.com/role-arn: arn:aws:iam::{{ .Values.aws.accountId }}:role/civiclink-marriage-service

podAnnotations:
  iam.amazonaws.com/role: civiclink-marriage-service

# Pulled by AWS Secrets Manager CSI driver
envFrom:
  - secretRef:
      name: marriage-service-aws-secrets