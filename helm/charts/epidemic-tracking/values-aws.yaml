# AWS overlay for epidemic-tracking.
cloud:
  provider: aws
  storageClass: gp3
  ingressClass: alb

serviceAccount:
  annotations:
    eks.amazonaws.com/role-arn: arn:aws:iam::{{ .Values.aws.accountId }}:role/civiclink-epidemic-tracking

podAnnotations:
  iam.amazonaws.com/role: civiclink-epidemic-tracking

# Pulled by AWS Secrets Manager CSI driver
envFrom:
  - secretRef:
      name: epidemic-tracking-aws-secrets