apiVersion: apps/v1
kind: Deployment
metadata:
  name: traffic-violation
  namespace: civiclink
  labels:
    app.kubernetes.io/name: traffic-violation
    app.kubernetes.io/part-of: civiclink
    civiclink.io/domain: public-safety
spec:
  replicas: 2
  selector: { matchLabels: { app.kubernetes.io/name: traffic-violation } }
  template:
    metadata:
      labels: { app.kubernetes.io/name: traffic-violation, civiclink.io/domain: public-safety }
    spec:
      serviceAccountName: traffic-violation
      securityContext: { runAsNonRoot: true, runAsUser: 1000, fsGroup: 1000 }
      containers:
        - name: traffic-violation
          image: harbor.civiclink.internal/civiclink/traffic-violation:latest
          ports: [{ containerPort: 50202, name: http }]
          envFrom: [{ configMapRef: { name: traffic-violation } }]
          livenessProbe:  { httpGet: { path: /healthz, port: 50202 }, initialDelaySeconds: 15 }
          readinessProbe: { httpGet: { path: /healthz, port: 50202 }, initialDelaySeconds: 5 }
          resources:
            requests: { cpu: 100m, memory: 128Mi }
            limits:   { cpu: 1000m, memory: 512Mi }
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities: { drop: ["ALL"] }