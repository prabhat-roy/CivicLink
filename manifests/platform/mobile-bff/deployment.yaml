apiVersion: apps/v1
kind: Deployment
metadata:
  name: mobile-bff
  namespace: civiclink
  labels:
    app.kubernetes.io/name: mobile-bff
    app.kubernetes.io/part-of: civiclink
    civiclink.io/domain: platform
spec:
  replicas: 2
  selector: { matchLabels: { app.kubernetes.io/name: mobile-bff } }
  template:
    metadata:
      labels: { app.kubernetes.io/name: mobile-bff, civiclink.io/domain: platform }
    spec:
      serviceAccountName: mobile-bff
      securityContext: { runAsNonRoot: true, runAsUser: 1000, fsGroup: 1000 }
      containers:
        - name: mobile-bff
          image: harbor.civiclink.internal/civiclink/mobile-bff:latest
          ports: [{ containerPort: 50003, name: http }]
          envFrom: [{ configMapRef: { name: mobile-bff } }]
          livenessProbe:  { httpGet: { path: /healthz, port: 50003 }, initialDelaySeconds: 15 }
          readinessProbe: { httpGet: { path: /healthz, port: 50003 }, initialDelaySeconds: 5 }
          resources:
            requests: { cpu: 100m, memory: 128Mi }
            limits:   { cpu: 1000m, memory: 512Mi }
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities: { drop: ["ALL"] }