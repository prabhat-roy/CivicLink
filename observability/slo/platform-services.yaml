apiVersion: pyrra.dev/v1alpha1
kind: ServiceLevelObjective
metadata: { name: api-gateway-availability, namespace: observability }
spec:
  target: '99.95'
  window: 4w
  indicator:
    ratio:
      errors:
        metric: http_requests_total{app="api-gateway",status=~"5.."}
      total:
        metric: http_requests_total{app="api-gateway"}