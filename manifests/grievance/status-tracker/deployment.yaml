apiVersion: apps/v1
kind: Deployment
metadata:
  name: status-tracker
  namespace: civiclink
  labels:
    app.kubernetes.io/name: status-tracker
    app.kubernetes.io/part-of: civiclink
    civiclink.io/domain: grievance
spec:
  replicas: 2
  selector: { matchLabels: { app.kubernetes.io/name: status-tracker } }
  template:
    metadata:
      labels: { app.kubernetes.io/name: status-tracker, civiclink.io/domain: grievance }
    spec:
      serviceAccountName: status-tracker
      securityContext: { runAsNonRoot: true, runAsUser: 1000, fsGroup: 1000 }
      containers:
        - name: status-tracker
          image: harbor.civiclink.internal/civiclink/status-tracker:latest
          ports: [{ containerPort: 50222, name: http }]
          envFrom: [{ configMapRef: { name: status-tracker } }]
          livenessProbe:  { httpGet: { path: /healthz, port: 50222 }, initialDelaySeconds: 15 }
          readinessProbe: { httpGet: { path: /healthz, port: 50222 }, initialDelaySeconds: 5 }
          resources:
            requests: { cpu: 100m, memory: 128Mi }
            limits:   { cpu: 1000m, memory: 512Mi }
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities: { drop: ["ALL"] }