# AWS overlay for incident-reporting.
cloud:
  provider: aws
  storageClass: gp3
  ingressClass: alb

serviceAccount:
  annotations:
    eks.amazonaws.com/role-arn: arn:aws:iam::{{ .Values.aws.accountId }}:role/civiclink-incident-reporting

podAnnotations:
  iam.amazonaws.com/role: civiclink-incident-reporting

# Pulled by AWS Secrets Manager CSI driver
envFrom:
  - secretRef:
      name: incident-reporting-aws-secrets