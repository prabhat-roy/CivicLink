apiVersion: apps/v1
kind: Deployment
metadata:
  name: school-registration
  namespace: civiclink
  labels:
    app.kubernetes.io/name: school-registration
    app.kubernetes.io/part-of: civiclink
    civiclink.io/domain: education
spec:
  replicas: 2
  selector: { matchLabels: { app.kubernetes.io/name: school-registration } }
  template:
    metadata:
      labels: { app.kubernetes.io/name: school-registration, civiclink.io/domain: education }
    spec:
      serviceAccountName: school-registration
      securityContext: { runAsNonRoot: true, runAsUser: 1000, fsGroup: 1000 }
      containers:
        - name: school-registration
          image: harbor.civiclink.internal/civiclink/school-registration:latest
          ports: [{ containerPort: 50180, name: http }]
          envFrom: [{ configMapRef: { name: school-registration } }]
          livenessProbe:  { httpGet: { path: /healthz, port: 50180 }, initialDelaySeconds: 15 }
          readinessProbe: { httpGet: { path: /healthz, port: 50180 }, initialDelaySeconds: 5 }
          resources:
            requests: { cpu: 100m, memory: 128Mi }
            limits:   { cpu: 1000m, memory: 512Mi }
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities: { drop: ["ALL"] }