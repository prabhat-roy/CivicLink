# AWS overlay for data-retention.
cloud:
  provider: aws
  storageClass: gp3
  ingressClass: alb

serviceAccount:
  annotations:
    eks.amazonaws.com/role-arn: arn:aws:iam::{{ .Values.aws.accountId }}:role/civiclink-data-retention

podAnnotations:
  iam.amazonaws.com/role: civiclink-data-retention

# Pulled by AWS Secrets Manager CSI driver
envFrom:
  - secretRef:
      name: data-retention-aws-secrets