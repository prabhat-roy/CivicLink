# GCP overlay for document-vault.
cloud:
  provider: gcp
  storageClass: pd-balanced
  ingressClass: gce

serviceAccount:
  annotations:
    iam.gke.io/gcp-service-account: civiclink-document-vault@{{ .Values.gcp.project }}.iam.gserviceaccount.com

podAnnotations:
  cluster-autoscaler.kubernetes.io/safe-to-evict: "true"

# Pulled by GCP Secret Manager CSI driver
envFrom:
  - secretRef:
      name: document-vault-gcp-secrets