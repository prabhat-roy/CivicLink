apiVersion: apps/v1
kind: Deployment
metadata:
  name: epidemic-tracking
  namespace: civiclink
  labels:
    app.kubernetes.io/name: epidemic-tracking
    app.kubernetes.io/part-of: civiclink
    civiclink.io/domain: public-health
spec:
  replicas: 2
  selector: { matchLabels: { app.kubernetes.io/name: epidemic-tracking } }
  template:
    metadata:
      labels: { app.kubernetes.io/name: epidemic-tracking, civiclink.io/domain: public-health }
    spec:
      serviceAccountName: epidemic-tracking
      securityContext: { runAsNonRoot: true, runAsUser: 1000, fsGroup: 1000 }
      containers:
        - name: epidemic-tracking
          image: harbor.civiclink.internal/civiclink/epidemic-tracking:latest
          ports: [{ containerPort: 50162, name: http }]
          envFrom: [{ configMapRef: { name: epidemic-tracking } }]
          livenessProbe:  { httpGet: { path: /healthz, port: 50162 }, initialDelaySeconds: 15 }
          readinessProbe: { httpGet: { path: /healthz, port: 50162 }, initialDelaySeconds: 5 }
          resources:
            requests: { cpu: 100m, memory: 128Mi }
            limits:   { cpu: 1000m, memory: 512Mi }
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities: { drop: ["ALL"] }