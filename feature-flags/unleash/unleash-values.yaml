replicaCount: 2
image: { repository: unleashorg/unleash-server, tag: "6.4" }
postgresql:
  enabled: true
  auth: { database: unleash, username: unleash, existingSecret: unleash-postgres }
ingress:
  enabled: true
  hosts: [{ host: flags.civiclink.internal, paths: [{ path: "/", pathType: Prefix }] }]
env:
  - { name: NODE_ENV, value: production }
  - { name: INIT_ADMIN_API_TOKENS, valueFrom: { secretKeyRef: { name: unleash-secrets, key: admin-token } } }
