apiVersion: apps/v1
kind: Deployment
metadata:
  name: license-service
  namespace: civiclink
  labels:
    app.kubernetes.io/name: license-service
    app.kubernetes.io/part-of: civiclink
    civiclink.io/domain: permits-licensing
spec:
  replicas: 2
  selector: { matchLabels: { app.kubernetes.io/name: license-service } }
  template:
    metadata:
      labels: { app.kubernetes.io/name: license-service, civiclink.io/domain: permits-licensing }
    spec:
      serviceAccountName: license-service
      securityContext: { runAsNonRoot: true, runAsUser: 1000, fsGroup: 1000 }
      containers:
        - name: license-service
          image: harbor.civiclink.internal/civiclink/license-service:latest
          ports: [{ containerPort: 50081, name: http }]
          envFrom: [{ configMapRef: { name: license-service } }]
          livenessProbe:  { httpGet: { path: /healthz, port: 50081 }, initialDelaySeconds: 15 }
          readinessProbe: { httpGet: { path: /healthz, port: 50081 }, initialDelaySeconds: 5 }
          resources:
            requests: { cpu: 100m, memory: 128Mi }
            limits:   { cpu: 1000m, memory: 512Mi }
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities: { drop: ["ALL"] }