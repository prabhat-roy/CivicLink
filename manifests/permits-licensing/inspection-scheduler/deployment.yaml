apiVersion: apps/v1
kind: Deployment
metadata:
  name: inspection-scheduler
  namespace: civiclink
  labels:
    app.kubernetes.io/name: inspection-scheduler
    app.kubernetes.io/part-of: civiclink
    civiclink.io/domain: permits-licensing
spec:
  replicas: 2
  selector: { matchLabels: { app.kubernetes.io/name: inspection-scheduler } }
  template:
    metadata:
      labels: { app.kubernetes.io/name: inspection-scheduler, civiclink.io/domain: permits-licensing }
    spec:
      serviceAccountName: inspection-scheduler
      securityContext: { runAsNonRoot: true, runAsUser: 1000, fsGroup: 1000 }
      containers:
        - name: inspection-scheduler
          image: harbor.civiclink.internal/civiclink/inspection-scheduler:latest
          ports: [{ containerPort: 50083, name: http }]
          envFrom: [{ configMapRef: { name: inspection-scheduler } }]
          livenessProbe:  { httpGet: { path: /healthz, port: 50083 }, initialDelaySeconds: 15 }
          readinessProbe: { httpGet: { path: /healthz, port: 50083 }, initialDelaySeconds: 5 }
          resources:
            requests: { cpu: 100m, memory: 128Mi }
            limits:   { cpu: 1000m, memory: 512Mi }
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities: { drop: ["ALL"] }