# Apache Polaris — Iceberg REST catalog with RBAC + multi-engine support
image: { repository: apache/polaris, tag: latest }
polaris:
  realm: civiclink
  storage:
    s3: { endpoint: http://minio.civiclink.svc:9000, region: us-east-1, bucket: civiclink-iceberg-warehouse }
ingress: { enabled: true, hosts: [{ host: polaris.civiclink.internal }] }
