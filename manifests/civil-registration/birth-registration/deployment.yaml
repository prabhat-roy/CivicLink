apiVersion: apps/v1
kind: Deployment
metadata:
  name: birth-registration
  namespace: civiclink
  labels:
    app.kubernetes.io/name: birth-registration
    app.kubernetes.io/part-of: civiclink
    civiclink.io/domain: civil-registration
spec:
  replicas: 2
  selector: { matchLabels: { app.kubernetes.io/name: birth-registration } }
  template:
    metadata:
      labels: { app.kubernetes.io/name: birth-registration, civiclink.io/domain: civil-registration }
    spec:
      serviceAccountName: birth-registration
      securityContext: { runAsNonRoot: true, runAsUser: 1000, fsGroup: 1000 }
      containers:
        - name: birth-registration
          image: harbor.civiclink.internal/civiclink/birth-registration:latest
          ports: [{ containerPort: 50060, name: http }]
          envFrom: [{ configMapRef: { name: birth-registration } }]
          livenessProbe:  { httpGet: { path: /healthz, port: 50060 }, initialDelaySeconds: 15 }
          readinessProbe: { httpGet: { path: /healthz, port: 50060 }, initialDelaySeconds: 5 }
          resources:
            requests: { cpu: 100m, memory: 128Mi }
            limits:   { cpu: 1000m, memory: 512Mi }
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities: { drop: ["ALL"] }