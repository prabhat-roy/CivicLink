openapi: 3.1.0
info:
  title: CivicLink Citizen API
  version: 0.1.0
  description: Public API surface for citizen-facing services.
servers:
  - { url: https://api.civiclink.gov, description: Production }
  - { url: https://staging.api.civiclink.gov, description: Staging }
paths:
  /healthz:
    get:
      tags: [system]
      operationId: getHealth
      responses:
        '200': { description: OK, content: { application/json: { schema: { $ref: '#/components/schemas/Health' } } } }
  /v1/grievance:
    post:
      tags: [grievance]
      operationId: createGrievance
      security: [{ citizenAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/CreateGrievanceRequest' }
      responses:
        '201': { description: Created, content: { application/json: { schema: { $ref: '#/components/schemas/Grievance' } } } }
        '400': { $ref: '#/components/responses/Error' }
        '401': { $ref: '#/components/responses/Error' }
components:
  securitySchemes:
    citizenAuth: { type: openIdConnect, openIdConnectUrl: https://keycloak.civiclink.gov/realms/civiclink/.well-known/openid-configuration }
  schemas:
    Health: { type: object, properties: { status: { type: string }, service: { type: string } } }
    CreateGrievanceRequest:
      type: object
      required: [category, description]
      properties:
        category:    { type: string, enum: [property-tax, public-safety, sanitation, electricity, water] }
        description: { type: string, minLength: 10, maxLength: 4000 }
    Grievance:
      type: object
      properties:
        grievance_id: { type: string }
        status:       { type: string, enum: [open, in_progress, escalated, resolved, closed] }
        filed_at:     { type: string, format: date-time }
    Error:
      type: object
      required: [code, message]
      properties:
        code:    { type: string }
        message: { type: string }
        details: { type: object }
  responses:
    Error: { description: Error response, content: { application/json: { schema: { $ref: '#/components/schemas/Error' } } } }
