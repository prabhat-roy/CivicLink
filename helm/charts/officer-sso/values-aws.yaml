# AWS overlay for officer-sso.
cloud:
  provider: aws
  storageClass: gp3
  ingressClass: alb

serviceAccount:
  annotations:
    eks.amazonaws.com/role-arn: arn:aws:iam::{{ .Values.aws.accountId }}:role/civiclink-officer-sso

podAnnotations:
  iam.amazonaws.com/role: civiclink-officer-sso

# Pulled by AWS Secrets Manager CSI driver
envFrom:
  - secretRef:
      name: officer-sso-aws-secrets