apiVersion: apps/v1
kind: Deployment
metadata:
  name: land-registry
  namespace: civiclink
  labels:
    app.kubernetes.io/name: land-registry
    app.kubernetes.io/part-of: civiclink
    civiclink.io/domain: land-property
spec:
  replicas: 2
  selector: { matchLabels: { app.kubernetes.io/name: land-registry } }
  template:
    metadata:
      labels: { app.kubernetes.io/name: land-registry, civiclink.io/domain: land-property }
    spec:
      serviceAccountName: land-registry
      securityContext: { runAsNonRoot: true, runAsUser: 1000, fsGroup: 1000 }
      containers:
        - name: land-registry
          image: harbor.civiclink.internal/civiclink/land-registry:latest
          ports: [{ containerPort: 50100, name: http }]
          envFrom: [{ configMapRef: { name: land-registry } }]
          livenessProbe:  { httpGet: { path: /healthz, port: 50100 }, initialDelaySeconds: 15 }
          readinessProbe: { httpGet: { path: /healthz, port: 50100 }, initialDelaySeconds: 5 }
          resources:
            requests: { cpu: 100m, memory: 128Mi }
            limits:   { cpu: 1000m, memory: 512Mi }
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities: { drop: ["ALL"] }