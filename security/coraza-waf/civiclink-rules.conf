SecRuleEngine On
SecRequestBodyAccess On
SecResponseBodyAccess Off
Include @owasp_crs/*.conf
SecRule REQUEST_HEADERS:User-Agent "@rx (?i)(nikto|nmap|sqlmap)" "id:1001,phase:1,deny,status:403,msg:'Banned scanner'"
SecRule ARGS "@detectXSS" "id:1002,phase:2,deny,status:400,log,msg:'XSS attempt'"
SecRule ARGS "@detectSQLi" "id:1003,phase:2,deny,status:400,log,msg:'SQLi attempt'"