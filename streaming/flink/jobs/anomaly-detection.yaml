apiVersion: flink.apache.org/v1beta1
kind: FlinkSessionJob
metadata: { name: civiclink-anomaly-detection, namespace: civiclink }
spec:
  deploymentName: civiclink-flink
  job:
    jarURI: s3://civiclink-flink-jobs/anomaly-detection.jar
    parallelism: 6
    upgradeMode: savepoint
    args: ["--source-topic", "civiclink.metrics.raw", "--sink-topic", "civiclink.alerts.anomaly"]
