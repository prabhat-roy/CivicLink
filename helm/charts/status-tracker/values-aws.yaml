# AWS overlay for status-tracker.
cloud:
  provider: aws
  storageClass: gp3
  ingressClass: alb

serviceAccount:
  annotations:
    eks.amazonaws.com/role-arn: arn:aws:iam::{{ .Values.aws.accountId }}:role/civiclink-status-tracker

podAnnotations:
  iam.amazonaws.com/role: civiclink-status-tracker

# Pulled by AWS Secrets Manager CSI driver
envFrom:
  - secretRef:
      name: status-tracker-aws-secrets