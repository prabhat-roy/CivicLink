openapi: 3.1.0
info:
  title: CivicLink Inter-Agency Federation API
  version: 0.1.0
  description: |
    Federated cross-agency data exchange API. Every request MUST present an
    OpenID4VC ConsentToken via `X-Consent-Token`, otherwise the request is
    rejected at the gateway.
servers:
  - { url: https://api.civiclink.gov }
paths:
  /v1/inter-agency/citizens/{token}:
    get:
      tags: [inter-agency]
      operationId: getCitizenByToken
      security: [{ partnerAuth: [] }]
      parameters:
        - { in: path, name: token, required: true, schema: { type: string } }
        - { in: header, name: X-Consent-Token, required: true, schema: { type: string } }
      responses:
        '200': { description: Found, content: { application/json: { schema: { $ref: '#/components/schemas/CitizenView' } } } }
        '403': { $ref: '#/components/responses/Error' }
        '404': { $ref: '#/components/responses/Error' }
components:
  securitySchemes:
    partnerAuth: { type: http, scheme: bearer, bearerFormat: JWT }
  schemas:
    CitizenView:
      type: object
      properties:
        token:     { type: string }
        full_name: { type: string }
        dob:       { type: string, format: date }
    Error:
      type: object
      required: [code, message]
      properties: { code: { type: string }, message: { type: string } }
  responses:
    Error: { description: Error, content: { application/json: { schema: { $ref: '#/components/schemas/Error' } } } }
