apiVersion: apps/v1
kind: Deployment
metadata:
  name: incident-reporting
  namespace: civiclink
  labels:
    app.kubernetes.io/name: incident-reporting
    app.kubernetes.io/part-of: civiclink
    civiclink.io/domain: public-safety
spec:
  replicas: 2
  selector: { matchLabels: { app.kubernetes.io/name: incident-reporting } }
  template:
    metadata:
      labels: { app.kubernetes.io/name: incident-reporting, civiclink.io/domain: public-safety }
    spec:
      serviceAccountName: incident-reporting
      securityContext: { runAsNonRoot: true, runAsUser: 1000, fsGroup: 1000 }
      containers:
        - name: incident-reporting
          image: harbor.civiclink.internal/civiclink/incident-reporting:latest
          ports: [{ containerPort: 50200, name: http }]
          envFrom: [{ configMapRef: { name: incident-reporting } }]
          livenessProbe:  { httpGet: { path: /healthz, port: 50200 }, initialDelaySeconds: 15 }
          readinessProbe: { httpGet: { path: /healthz, port: 50200 }, initialDelaySeconds: 5 }
          resources:
            requests: { cpu: 100m, memory: 128Mi }
            limits:   { cpu: 1000m, memory: 512Mi }
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities: { drop: ["ALL"] }