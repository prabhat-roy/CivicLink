# AWS overlay for birth-registration.
cloud:
  provider: aws
  storageClass: gp3
  ingressClass: alb

serviceAccount:
  annotations:
    eks.amazonaws.com/role-arn: arn:aws:iam::{{ .Values.aws.accountId }}:role/civiclink-birth-registration

podAnnotations:
  iam.amazonaws.com/role: civiclink-birth-registration

# Pulled by AWS Secrets Manager CSI driver
envFrom:
  - secretRef:
      name: birth-registration-aws-secrets