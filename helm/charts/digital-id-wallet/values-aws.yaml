# AWS overlay for digital-id-wallet.
cloud:
  provider: aws
  storageClass: gp3
  ingressClass: alb

serviceAccount:
  annotations:
    eks.amazonaws.com/role-arn: arn:aws:iam::{{ .Values.aws.accountId }}:role/civiclink-digital-id-wallet

podAnnotations:
  iam.amazonaws.com/role: civiclink-digital-id-wallet

# Pulled by AWS Secrets Manager CSI driver
envFrom:
  - secretRef:
      name: digital-id-wallet-aws-secrets