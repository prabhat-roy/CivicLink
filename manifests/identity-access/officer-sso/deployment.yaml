apiVersion: apps/v1
kind: Deployment
metadata:
  name: officer-sso
  namespace: civiclink
  labels:
    app.kubernetes.io/name: officer-sso
    app.kubernetes.io/part-of: civiclink
    civiclink.io/domain: identity-access
spec:
  replicas: 2
  selector: { matchLabels: { app.kubernetes.io/name: officer-sso } }
  template:
    metadata:
      labels: { app.kubernetes.io/name: officer-sso, civiclink.io/domain: identity-access }
    spec:
      serviceAccountName: officer-sso
      securityContext: { runAsNonRoot: true, runAsUser: 1000, fsGroup: 1000 }
      containers:
        - name: officer-sso
          image: harbor.civiclink.internal/civiclink/officer-sso:latest
          ports: [{ containerPort: 50021, name: http }]
          envFrom: [{ configMapRef: { name: officer-sso } }]
          livenessProbe:  { httpGet: { path: /healthz, port: 50021 }, initialDelaySeconds: 15 }
          readinessProbe: { httpGet: { path: /healthz, port: 50021 }, initialDelaySeconds: 5 }
          resources:
            requests: { cpu: 100m, memory: 128Mi }
            limits:   { cpu: 1000m, memory: 512Mi }
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities: { drop: ["ALL"] }