apiVersion: apps/v1
kind: Deployment
metadata:
  name: eligibility-engine
  namespace: civiclink
  labels:
    app.kubernetes.io/name: eligibility-engine
    app.kubernetes.io/part-of: civiclink
    civiclink.io/domain: social-welfare
spec:
  replicas: 2
  selector: { matchLabels: { app.kubernetes.io/name: eligibility-engine } }
  template:
    metadata:
      labels: { app.kubernetes.io/name: eligibility-engine, civiclink.io/domain: social-welfare }
    spec:
      serviceAccountName: eligibility-engine
      securityContext: { runAsNonRoot: true, runAsUser: 1000, fsGroup: 1000 }
      containers:
        - name: eligibility-engine
          image: harbor.civiclink.internal/civiclink/eligibility-engine:latest
          ports: [{ containerPort: 50141, name: http }]
          envFrom: [{ configMapRef: { name: eligibility-engine } }]
          livenessProbe:  { httpGet: { path: /healthz, port: 50141 }, initialDelaySeconds: 15 }
          readinessProbe: { httpGet: { path: /healthz, port: 50141 }, initialDelaySeconds: 5 }
          resources:
            requests: { cpu: 100m, memory: 128Mi }
            limits:   { cpu: 1000m, memory: 512Mi }
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities: { drop: ["ALL"] }