# AWS overlay for health-record.
cloud:
  provider: aws
  storageClass: gp3
  ingressClass: alb

serviceAccount:
  annotations:
    eks.amazonaws.com/role-arn: arn:aws:iam::{{ .Values.aws.accountId }}:role/civiclink-health-record

podAnnotations:
  iam.amazonaws.com/role: civiclink-health-record

# Pulled by AWS Secrets Manager CSI driver
envFrom:
  - secretRef:
      name: health-record-aws-secrets