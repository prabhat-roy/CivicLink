apiVersion: apps/v1
kind: Deployment
metadata:
  name: geospatial-analytics
  namespace: civiclink
  labels:
    app.kubernetes.io/name: geospatial-analytics
    app.kubernetes.io/part-of: civiclink
    civiclink.io/domain: analytics-policy
spec:
  replicas: 2
  selector: { matchLabels: { app.kubernetes.io/name: geospatial-analytics } }
  template:
    metadata:
      labels: { app.kubernetes.io/name: geospatial-analytics, civiclink.io/domain: analytics-policy }
    spec:
      serviceAccountName: geospatial-analytics
      securityContext: { runAsNonRoot: true, runAsUser: 1000, fsGroup: 1000 }
      containers:
        - name: geospatial-analytics
          image: harbor.civiclink.internal/civiclink/geospatial-analytics:latest
          ports: [{ containerPort: 50302, name: http }]
          envFrom: [{ configMapRef: { name: geospatial-analytics } }]
          livenessProbe:  { httpGet: { path: /healthz, port: 50302 }, initialDelaySeconds: 15 }
          readinessProbe: { httpGet: { path: /healthz, port: 50302 }, initialDelaySeconds: 5 }
          resources:
            requests: { cpu: 100m, memory: 128Mi }
            limits:   { cpu: 1000m, memory: 512Mi }
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities: { drop: ["ALL"] }