syntax = "proto3";

package civiclink.interagency.v1;

import "common/types.proto";
import "google/protobuf/timestamp.proto";

option java_package = "com.civiclink.interagency.v1";
option java_multiple_files = true;

// api-registry: Inter-agency API catalogue
service  $args[0].Value.ToUpper() pi $args[0].Groups[1].Value.ToUpper() egistryService {
  rpc Health(HealthRequest) returns (HealthResponse);

  // TODO: domain-specific RPCs added in subsequent waves.
  // Placeholder Get/List/Create/Update/Delete are intentionally omitted at this stage —
  // they will be defined when each service's domain model is finalised.
}

message HealthRequest {}
message HealthResponse {
  string status = 1;
  string version = 2;
  google.protobuf.Timestamp checked_at = 3;
}