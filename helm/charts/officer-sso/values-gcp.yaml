# GCP overlay for officer-sso.
cloud:
  provider: gcp
  storageClass: pd-balanced
  ingressClass: gce

serviceAccount:
  annotations:
    iam.gke.io/gcp-service-account: civiclink-officer-sso@{{ .Values.gcp.project }}.iam.gserviceaccount.com

podAnnotations:
  cluster-autoscaler.kubernetes.io/safe-to-evict: "true"

# Pulled by GCP Secret Manager CSI driver
envFrom:
  - secretRef:
      name: officer-sso-gcp-secrets