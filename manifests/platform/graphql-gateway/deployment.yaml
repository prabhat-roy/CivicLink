apiVersion: apps/v1
kind: Deployment
metadata:
  name: graphql-gateway
  namespace: civiclink
  labels:
    app.kubernetes.io/name: graphql-gateway
    app.kubernetes.io/part-of: civiclink
    civiclink.io/domain: platform
spec:
  replicas: 2
  selector: { matchLabels: { app.kubernetes.io/name: graphql-gateway } }
  template:
    metadata:
      labels: { app.kubernetes.io/name: graphql-gateway, civiclink.io/domain: platform }
    spec:
      serviceAccountName: graphql-gateway
      securityContext: { runAsNonRoot: true, runAsUser: 1000, fsGroup: 1000 }
      containers:
        - name: graphql-gateway
          image: harbor.civiclink.internal/civiclink/graphql-gateway:latest
          ports: [{ containerPort: 50004, name: http }]
          envFrom: [{ configMapRef: { name: graphql-gateway } }]
          livenessProbe:  { httpGet: { path: /healthz, port: 50004 }, initialDelaySeconds: 15 }
          readinessProbe: { httpGet: { path: /healthz, port: 50004 }, initialDelaySeconds: 5 }
          resources:
            requests: { cpu: 100m, memory: 128Mi }
            limits:   { cpu: 1000m, memory: 512Mi }
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities: { drop: ["ALL"] }