apiVersion: apps/v1
kind: Deployment
metadata:
  name: tax-filing
  namespace: civiclink
  labels:
    app.kubernetes.io/name: tax-filing
    app.kubernetes.io/part-of: civiclink
    civiclink.io/domain: taxation
spec:
  replicas: 2
  selector: { matchLabels: { app.kubernetes.io/name: tax-filing } }
  template:
    metadata:
      labels: { app.kubernetes.io/name: tax-filing, civiclink.io/domain: taxation }
    spec:
      serviceAccountName: tax-filing
      securityContext: { runAsNonRoot: true, runAsUser: 1000, fsGroup: 1000 }
      containers:
        - name: tax-filing
          image: harbor.civiclink.internal/civiclink/tax-filing:latest
          ports: [{ containerPort: 50121, name: http }]
          envFrom: [{ configMapRef: { name: tax-filing } }]
          livenessProbe:  { httpGet: { path: /healthz, port: 50121 }, initialDelaySeconds: 15 }
          readinessProbe: { httpGet: { path: /healthz, port: 50121 }, initialDelaySeconds: 5 }
          resources:
            requests: { cpu: 100m, memory: 128Mi }
            limits:   { cpu: 1000m, memory: 512Mi }
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities: { drop: ["ALL"] }