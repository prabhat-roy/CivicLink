apiVersion: argoproj.io/v1alpha1
kind: Rollout
metadata:
  name: bi-service
  namespace: civiclink
spec:
  replicas: 3
  strategy:
    canary:
      steps:
        - setWeight: 10
        - pause: { duration: 5m }
        - analysis:
            templates: [{ templateName: civiclink-canary-analysis }]
            args:
              - { name: service-name, value: bi-service }
        - setWeight: 25
        - pause: { duration: 5m }
        - setWeight: 50
        - pause: { duration: 5m }
        - setWeight: 100
  selector:
    matchLabels: { app.kubernetes.io/name: bi-service }
  template:
    metadata:
      labels: { app.kubernetes.io/name: bi-service }
    spec:
      containers:
        - name: bi-service
          image: harbor.civiclink.internal/civiclink/
          ports: [{ containerPort: 50303 }]