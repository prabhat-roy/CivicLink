apiVersion: apps/v1
kind: Deployment
metadata:
  name: property-valuation
  namespace: civiclink
  labels:
    app.kubernetes.io/name: property-valuation
    app.kubernetes.io/part-of: civiclink
    civiclink.io/domain: land-property
spec:
  replicas: 2
  selector: { matchLabels: { app.kubernetes.io/name: property-valuation } }
  template:
    metadata:
      labels: { app.kubernetes.io/name: property-valuation, civiclink.io/domain: land-property }
    spec:
      serviceAccountName: property-valuation
      securityContext: { runAsNonRoot: true, runAsUser: 1000, fsGroup: 1000 }
      containers:
        - name: property-valuation
          image: harbor.civiclink.internal/civiclink/property-valuation:latest
          ports: [{ containerPort: 50101, name: http }]
          envFrom: [{ configMapRef: { name: property-valuation } }]
          livenessProbe:  { httpGet: { path: /healthz, port: 50101 }, initialDelaySeconds: 15 }
          readinessProbe: { httpGet: { path: /healthz, port: 50101 }, initialDelaySeconds: 5 }
          resources:
            requests: { cpu: 100m, memory: 128Mi }
            limits:   { cpu: 1000m, memory: 512Mi }
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities: { drop: ["ALL"] }