apiVersion: networking.istio.io/v1
kind: Gateway
metadata: { name: civiclink, namespace: istio-system }
spec:
  selector: { istio: ingressgateway }
  servers:
    - port: { number: 443, name: https, protocol: HTTPS }
      tls: { mode: SIMPLE, credentialName: civiclink-tls }
      hosts: ["civiclink.gov","officer.civiclink.gov","api.civiclink.gov"]