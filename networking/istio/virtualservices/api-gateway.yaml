apiVersion: networking.istio.io/v1
kind: VirtualService
metadata: { name: api-gateway, namespace: civiclink }
spec:
  hosts: [api.civiclink.gov]
  gateways: [istio-system/civiclink]
  http:
    - route:
        - destination: { host: api-gateway, port: { number: 50000 } }
      retries: { attempts: 3, perTryTimeout: 2s, retryOn: 5xx }
      timeout: 30s