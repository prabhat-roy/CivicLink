apiVersion: apps/v1
kind: Deployment
metadata:
  name: citizen-sso
  namespace: civiclink
  labels:
    app.kubernetes.io/name: citizen-sso
    app.kubernetes.io/part-of: civiclink
    civiclink.io/domain: identity-access
spec:
  replicas: 2
  selector: { matchLabels: { app.kubernetes.io/name: citizen-sso } }
  template:
    metadata:
      labels: { app.kubernetes.io/name: citizen-sso, civiclink.io/domain: identity-access }
    spec:
      serviceAccountName: citizen-sso
      securityContext: { runAsNonRoot: true, runAsUser: 1000, fsGroup: 1000 }
      containers:
        - name: citizen-sso
          image: harbor.civiclink.internal/civiclink/citizen-sso:latest
          ports: [{ containerPort: 50022, name: http }]
          envFrom: [{ configMapRef: { name: citizen-sso } }]
          livenessProbe:  { httpGet: { path: /healthz, port: 50022 }, initialDelaySeconds: 15 }
          readinessProbe: { httpGet: { path: /healthz, port: 50022 }, initialDelaySeconds: 5 }
          resources:
            requests: { cpu: 100m, memory: 128Mi }
            limits:   { cpu: 1000m, memory: 512Mi }
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities: { drop: ["ALL"] }