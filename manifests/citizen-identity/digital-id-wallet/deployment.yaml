apiVersion: apps/v1
kind: Deployment
metadata:
  name: digital-id-wallet
  namespace: civiclink
  labels:
    app.kubernetes.io/name: digital-id-wallet
    app.kubernetes.io/part-of: civiclink
    civiclink.io/domain: citizen-identity
spec:
  replicas: 2
  selector: { matchLabels: { app.kubernetes.io/name: digital-id-wallet } }
  template:
    metadata:
      labels: { app.kubernetes.io/name: digital-id-wallet, civiclink.io/domain: citizen-identity }
    spec:
      serviceAccountName: digital-id-wallet
      securityContext: { runAsNonRoot: true, runAsUser: 1000, fsGroup: 1000 }
      containers:
        - name: digital-id-wallet
          image: harbor.civiclink.internal/civiclink/digital-id-wallet:latest
          ports: [{ containerPort: 50041, name: http }]
          envFrom: [{ configMapRef: { name: digital-id-wallet } }]
          livenessProbe:  { httpGet: { path: /healthz, port: 50041 }, initialDelaySeconds: 15 }
          readinessProbe: { httpGet: { path: /healthz, port: 50041 }, initialDelaySeconds: 5 }
          resources:
            requests: { cpu: 100m, memory: 128Mi }
            limits:   { cpu: 1000m, memory: 512Mi }
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities: { drop: ["ALL"] }