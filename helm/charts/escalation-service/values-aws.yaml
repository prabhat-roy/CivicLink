# AWS overlay for escalation-service.
cloud:
  provider: aws
  storageClass: gp3
  ingressClass: alb

serviceAccount:
  annotations:
    eks.amazonaws.com/role-arn: arn:aws:iam::{{ .Values.aws.accountId }}:role/civiclink-escalation-service

podAnnotations:
  iam.amazonaws.com/role: civiclink-escalation-service

# Pulled by AWS Secrets Manager CSI driver
envFrom:
  - secretRef:
      name: escalation-service-aws-secrets