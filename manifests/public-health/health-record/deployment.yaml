apiVersion: apps/v1
kind: Deployment
metadata:
  name: health-record
  namespace: civiclink
  labels:
    app.kubernetes.io/name: health-record
    app.kubernetes.io/part-of: civiclink
    civiclink.io/domain: public-health
spec:
  replicas: 2
  selector: { matchLabels: { app.kubernetes.io/name: health-record } }
  template:
    metadata:
      labels: { app.kubernetes.io/name: health-record, civiclink.io/domain: public-health }
    spec:
      serviceAccountName: health-record
      securityContext: { runAsNonRoot: true, runAsUser: 1000, fsGroup: 1000 }
      containers:
        - name: health-record
          image: harbor.civiclink.internal/civiclink/health-record:latest
          ports: [{ containerPort: 50161, name: http }]
          envFrom: [{ configMapRef: { name: health-record } }]
          livenessProbe:  { httpGet: { path: /healthz, port: 50161 }, initialDelaySeconds: 15 }
          readinessProbe: { httpGet: { path: /healthz, port: 50161 }, initialDelaySeconds: 5 }
          resources:
            requests: { cpu: 100m, memory: 128Mi }
            limits:   { cpu: 1000m, memory: 512Mi }
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities: { drop: ["ALL"] }