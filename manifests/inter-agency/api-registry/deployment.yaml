apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-registry
  namespace: civiclink
  labels:
    app.kubernetes.io/name: api-registry
    app.kubernetes.io/part-of: civiclink
    civiclink.io/domain: inter-agency
spec:
  replicas: 2
  selector: { matchLabels: { app.kubernetes.io/name: api-registry } }
  template:
    metadata:
      labels: { app.kubernetes.io/name: api-registry, civiclink.io/domain: inter-agency }
    spec:
      serviceAccountName: api-registry
      securityContext: { runAsNonRoot: true, runAsUser: 1000, fsGroup: 1000 }
      containers:
        - name: api-registry
          image: harbor.civiclink.internal/civiclink/api-registry:latest
          ports: [{ containerPort: 50282, name: http }]
          envFrom: [{ configMapRef: { name: api-registry } }]
          livenessProbe:  { httpGet: { path: /healthz, port: 50282 }, initialDelaySeconds: 15 }
          readinessProbe: { httpGet: { path: /healthz, port: 50282 }, initialDelaySeconds: 5 }
          resources:
            requests: { cpu: 100m, memory: 128Mi }
            limits:   { cpu: 1000m, memory: 512Mi }
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities: { drop: ["ALL"] }