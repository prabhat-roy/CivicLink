# AWS overlay for case-management.
cloud:
  provider: aws
  storageClass: gp3
  ingressClass: alb

serviceAccount:
  annotations:
    eks.amazonaws.com/role-arn: arn:aws:iam::{{ .Values.aws.accountId }}:role/civiclink-case-management

podAnnotations:
  iam.amazonaws.com/role: civiclink-case-management

# Pulled by AWS Secrets Manager CSI driver
envFrom:
  - secretRef:
      name: case-management-aws-secrets