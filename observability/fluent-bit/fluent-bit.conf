[SERVICE]
    Daemon Off
    HTTP_Server On
    HTTP_Port 2020
    Parsers_File parsers.conf

[INPUT]
    Name tail
    Path /var/log/containers/*civiclink*.log
    Parser docker
    Tag kube.*
    Refresh_Interval 5

[FILTER]
    Name modify
    Match *
    Add cluster civiclink

# PII masking — never let raw national IDs reach Loki.
[FILTER]
    Name modify
    Match *
    Rename national_id national_id_redacted

[OUTPUT]
    Name loki
    Match kube.*
    host loki
    port 3100
    labels job=civiclink, app=$kubernetes['labels']['app.kubernetes.io/name']