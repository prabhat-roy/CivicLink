# AWS overlay for access-log-service.
cloud:
  provider: aws
  storageClass: gp3
  ingressClass: alb

serviceAccount:
  annotations:
    eks.amazonaws.com/role-arn: arn:aws:iam::{{ .Values.aws.accountId }}:role/civiclink-access-log-service

podAnnotations:
  iam.amazonaws.com/role: civiclink-access-log-service

# Pulled by AWS Secrets Manager CSI driver
envFrom:
  - secretRef:
      name: access-log-service-aws-secrets