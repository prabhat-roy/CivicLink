apiVersion: argoproj.io/v1alpha1
kind: Rollout
metadata:
  name: inspection-scheduler
  namespace: civiclink
spec:
  replicas: 3
  strategy:
    canary:
      steps:
        - setWeight: 10
        - pause: { duration: 5m }
        - analysis:
            templates: [{ templateName: civiclink-canary-analysis }]
            args:
              - { name: service-name, value: inspection-scheduler }
        - setWeight: 25
        - pause: { duration: 5m }
        - setWeight: 50
        - pause: { duration: 5m }
        - setWeight: 100
  selector:
    matchLabels: { app.kubernetes.io/name: inspection-scheduler }
  template:
    metadata:
      labels: { app.kubernetes.io/name: inspection-scheduler }
    spec:
      containers:
        - name: inspection-scheduler
          image: harbor.civiclink.internal/civiclink/
          ports: [{ containerPort: 50083 }]