apiVersion: apps/v1
kind: Deployment
metadata:
  name: ivr-service
  namespace: civiclink
  labels:
    app.kubernetes.io/name: ivr-service
    app.kubernetes.io/part-of: civiclink
    civiclink.io/domain: notifications
spec:
  replicas: 2
  selector: { matchLabels: { app.kubernetes.io/name: ivr-service } }
  template:
    metadata:
      labels: { app.kubernetes.io/name: ivr-service, civiclink.io/domain: notifications }
    spec:
      serviceAccountName: ivr-service
      securityContext: { runAsNonRoot: true, runAsUser: 1000, fsGroup: 1000 }
      containers:
        - name: ivr-service
          image: harbor.civiclink.internal/civiclink/ivr-service:latest
          ports: [{ containerPort: 50325, name: http }]
          envFrom: [{ configMapRef: { name: ivr-service } }]
          livenessProbe:  { httpGet: { path: /healthz, port: 50325 }, initialDelaySeconds: 15 }
          readinessProbe: { httpGet: { path: /healthz, port: 50325 }, initialDelaySeconds: 5 }
          resources:
            requests: { cpu: 100m, memory: 128Mi }
            limits:   { cpu: 1000m, memory: 512Mi }
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities: { drop: ["ALL"] }