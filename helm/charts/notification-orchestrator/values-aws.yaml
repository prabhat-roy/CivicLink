# AWS overlay for notification-orchestrator.
cloud:
  provider: aws
  storageClass: gp3
  ingressClass: alb

serviceAccount:
  annotations:
    eks.amazonaws.com/role-arn: arn:aws:iam::{{ .Values.aws.accountId }}:role/civiclink-notification-orchestrator

podAnnotations:
  iam.amazonaws.com/role: civiclink-notification-orchestrator

# Pulled by AWS Secrets Manager CSI driver
envFrom:
  - secretRef:
      name: notification-orchestrator-aws-secrets