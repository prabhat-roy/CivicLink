# Cloud-agnostic defaults for disbursement-service.
# Overlay with values-{aws|gcp|azure}.yaml for cloud-specific settings.

image:
  repository: civiclink/disbursement-service
  tag: ""        # defaults to .Chart.AppVersion
  pullPolicy: IfNotPresent

replicaCount: 2

service:
  type: ClusterIP
  port: 50142
  targetPort: 50142

resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 1000m
    memory: 512Mi

probes:
  liveness:
    httpGet:
      path: /healthz
      port: 50142
    initialDelaySeconds: 15
    periodSeconds: 20
  readiness:
    httpGet:
      path: /healthz
      port: 50142
    initialDelaySeconds: 5
    periodSeconds: 10

serviceAccount:
  create: true
  annotations: {}

podLabels:
  app.kubernetes.io/name: disbursement-service
  app.kubernetes.io/part-of: civiclink
  shopos.io/domain: social-welfare
  civiclink.io/owner-team: social-welfare

podAnnotations: {}

securityContext:
  runAsNonRoot: true
  runAsUser: 1000
  fsGroup: 1000
  seccompProfile:
    type: RuntimeDefault

containerSecurityContext:
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: true
  capabilities:
    drop: ["ALL"]

env: []        # additional env vars
envFrom: []    # references to ConfigMaps / Secrets

config:
  LOG_LEVEL: info

# Cloud overlay placeholders (overridden in values-<cloud>.yaml)
cloud:
  provider: ""           # aws | gcp | azure
  storageClass: ""
  ingressClass: ""