apiVersion: apps/v1
kind: Deployment
metadata:
  name: national-id-service
  namespace: civiclink
  labels:
    app.kubernetes.io/name: national-id-service
    app.kubernetes.io/part-of: civiclink
    civiclink.io/domain: citizen-identity
spec:
  replicas: 2
  selector: { matchLabels: { app.kubernetes.io/name: national-id-service } }
  template:
    metadata:
      labels: { app.kubernetes.io/name: national-id-service, civiclink.io/domain: citizen-identity }
    spec:
      serviceAccountName: national-id-service
      securityContext: { runAsNonRoot: true, runAsUser: 1000, fsGroup: 1000 }
      containers:
        - name: national-id-service
          image: harbor.civiclink.internal/civiclink/national-id-service:latest
          ports: [{ containerPort: 50040, name: http }]
          envFrom: [{ configMapRef: { name: national-id-service } }]
          livenessProbe:  { httpGet: { path: /healthz, port: 50040 }, initialDelaySeconds: 15 }
          readinessProbe: { httpGet: { path: /healthz, port: 50040 }, initialDelaySeconds: 5 }
          resources:
            requests: { cpu: 100m, memory: 128Mi }
            limits:   { cpu: 1000m, memory: 512Mi }
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities: { drop: ["ALL"] }