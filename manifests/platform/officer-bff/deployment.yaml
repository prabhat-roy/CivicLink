apiVersion: apps/v1
kind: Deployment
metadata:
  name: officer-bff
  namespace: civiclink
  labels:
    app.kubernetes.io/name: officer-bff
    app.kubernetes.io/part-of: civiclink
    civiclink.io/domain: platform
spec:
  replicas: 2
  selector: { matchLabels: { app.kubernetes.io/name: officer-bff } }
  template:
    metadata:
      labels: { app.kubernetes.io/name: officer-bff, civiclink.io/domain: platform }
    spec:
      serviceAccountName: officer-bff
      securityContext: { runAsNonRoot: true, runAsUser: 1000, fsGroup: 1000 }
      containers:
        - name: officer-bff
          image: harbor.civiclink.internal/civiclink/officer-bff:latest
          ports: [{ containerPort: 50002, name: http }]
          envFrom: [{ configMapRef: { name: officer-bff } }]
          livenessProbe:  { httpGet: { path: /healthz, port: 50002 }, initialDelaySeconds: 15 }
          readinessProbe: { httpGet: { path: /healthz, port: 50002 }, initialDelaySeconds: 5 }
          resources:
            requests: { cpu: 100m, memory: 128Mi }
            limits:   { cpu: 1000m, memory: 512Mi }
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities: { drop: ["ALL"] }