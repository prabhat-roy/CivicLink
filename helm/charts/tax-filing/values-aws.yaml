# AWS overlay for tax-filing.
cloud:
  provider: aws
  storageClass: gp3
  ingressClass: alb

serviceAccount:
  annotations:
    eks.amazonaws.com/role-arn: arn:aws:iam::{{ .Values.aws.accountId }}:role/civiclink-tax-filing

podAnnotations:
  iam.amazonaws.com/role: civiclink-tax-filing

# Pulled by AWS Secrets Manager CSI driver
envFrom:
  - secretRef:
      name: tax-filing-aws-secrets