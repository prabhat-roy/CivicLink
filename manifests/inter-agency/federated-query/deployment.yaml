apiVersion: apps/v1
kind: Deployment
metadata:
  name: federated-query
  namespace: civiclink
  labels:
    app.kubernetes.io/name: federated-query
    app.kubernetes.io/part-of: civiclink
    civiclink.io/domain: inter-agency
spec:
  replicas: 2
  selector: { matchLabels: { app.kubernetes.io/name: federated-query } }
  template:
    metadata:
      labels: { app.kubernetes.io/name: federated-query, civiclink.io/domain: inter-agency }
    spec:
      serviceAccountName: federated-query
      securityContext: { runAsNonRoot: true, runAsUser: 1000, fsGroup: 1000 }
      containers:
        - name: federated-query
          image: harbor.civiclink.internal/civiclink/federated-query:latest
          ports: [{ containerPort: 50283, name: http }]
          envFrom: [{ configMapRef: { name: federated-query } }]
          livenessProbe:  { httpGet: { path: /healthz, port: 50283 }, initialDelaySeconds: 15 }
          readinessProbe: { httpGet: { path: /healthz, port: 50283 }, initialDelaySeconds: 5 }
          resources:
            requests: { cpu: 100m, memory: 128Mi }
            limits:   { cpu: 1000m, memory: 512Mi }
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities: { drop: ["ALL"] }