# AWS overlay for data-exchange-gateway.
cloud:
  provider: aws
  storageClass: gp3
  ingressClass: alb

serviceAccount:
  annotations:
    eks.amazonaws.com/role-arn: arn:aws:iam::{{ .Values.aws.accountId }}:role/civiclink-data-exchange-gateway

podAnnotations:
  iam.amazonaws.com/role: civiclink-data-exchange-gateway

# Pulled by AWS Secrets Manager CSI driver
envFrom:
  - secretRef:
      name: data-exchange-gateway-aws-secrets