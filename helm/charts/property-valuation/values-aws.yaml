# AWS overlay for property-valuation.
cloud:
  provider: aws
  storageClass: gp3
  ingressClass: alb

serviceAccount:
  annotations:
    eks.amazonaws.com/role-arn: arn:aws:iam::{{ .Values.aws.accountId }}:role/civiclink-property-valuation

podAnnotations:
  iam.amazonaws.com/role: civiclink-property-valuation

# Pulled by AWS Secrets Manager CSI driver
envFrom:
  - secretRef:
      name: property-valuation-aws-secrets