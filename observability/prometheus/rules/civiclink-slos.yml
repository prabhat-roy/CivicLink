groups:
  - name: civiclink-slo-burn
    rules:
      - alert: CivicLinkErrorBudgetBurn
        expr: |
          (
            sum(rate(http_requests_total{namespace="civiclink",status=~"5.."}[5m])) by (app)
            /
            sum(rate(http_requests_total{namespace="civiclink"}[5m])) by (app)
          ) > 0.01
        for: 5m
        labels: { severity: critical, team: '{{ $labels.app }}' }
        annotations: { summary: "Error rate >1% for {{ $labels.app }}" }

      - alert: CivicLinkLatencyP99
        expr: |
          histogram_quantile(0.99,
            sum by (app, le) (rate(http_request_duration_seconds_bucket{namespace="civiclink"}[5m]))
          ) > 1
        for: 10m
        labels: { severity: warning }
        annotations: { summary: "p99 latency >1s for {{ $labels.app }}" }