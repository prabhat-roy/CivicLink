apiVersion: v1
kind: ConfigMap
metadata: { name: conduktor-config, namespace: kafka }
data:
  config.yaml: |
    interceptors:
      - name: schema-validation
        config: { allowedNamespaces: ["com.civiclink.*"] }
      - name: pii-mask
        config: { fields: [national_id, phone, email] }
      - name: rate-limit
        config:
          perPrincipal: { producer: 10000, consumer: 50000 }
