apiVersion: apps/v1
kind: Deployment
metadata:
  name: audit-trail
  namespace: civiclink
  labels:
    app.kubernetes.io/name: audit-trail
    app.kubernetes.io/part-of: civiclink
    civiclink.io/domain: audit-compliance
spec:
  replicas: 2
  selector: { matchLabels: { app.kubernetes.io/name: audit-trail } }
  template:
    metadata:
      labels: { app.kubernetes.io/name: audit-trail, civiclink.io/domain: audit-compliance }
    spec:
      serviceAccountName: audit-trail
      securityContext: { runAsNonRoot: true, runAsUser: 1000, fsGroup: 1000 }
      containers:
        - name: audit-trail
          image: harbor.civiclink.internal/civiclink/audit-trail:latest
          ports: [{ containerPort: 50340, name: http }]
          envFrom: [{ configMapRef: { name: audit-trail } }]
          livenessProbe:  { httpGet: { path: /healthz, port: 50340 }, initialDelaySeconds: 15 }
          readinessProbe: { httpGet: { path: /healthz, port: 50340 }, initialDelaySeconds: 5 }
          resources:
            requests: { cpu: 100m, memory: 128Mi }
            limits:   { cpu: 1000m, memory: 512Mi }
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities: { drop: ["ALL"] }